kind = "web"
previewPath = "/"
title = "Phim VietSub"
version = "1.0.0"
id = "artifacts/phim-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22093

[services.development]
run = "pnpm --filter @workspace/phim-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phim-web", "run", "build" ]
publicDir = "artifacts/phim-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22093"
BASE_PATH = "/"
