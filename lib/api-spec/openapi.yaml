openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /movies:
    get:
      operationId: getMovies
      tags: [movies]
      summary: Get movies list
      description: Returns paginated list of movies scraped from source
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Cursor URL for next page (from previous response nextCursor)
      responses:
        "200":
          description: Movie list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/search:
    get:
      operationId: searchMovies
      tags: [movies]
      summary: Search movies
      description: Search movies by keyword
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/detail:
    get:
      operationId: getMovieDetail
      tags: [movies]
      summary: Get movie detail
      description: Returns movie detail info
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
  /movies/category:
    get:
      operationId: getMoviesByCategory
      tags: [movies]
      summary: Get movies by category/label
      description: Returns movies filtered by category label
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Category movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Movie:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        thumbnail:
          type: string
        quality:
          type: string
        year:
          type: string
        episode:
          type: string
        labels:
          type: array
          items:
            type: string
      required:
        - title
        - url
    MovieListResponse:
      type: object
      properties:
        movies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        nextCursor:
          type: string
          description: URL cursor for the next page, empty string if no more pages
        hasNextPage:
          type: boolean
        page:
          type: integer
      required:
        - movies
        - hasNextPage
        - page
    EpisodeItem:
      type: object
      properties:
        num:
          type: string
        url:
          type: string
      required:
        - num
        - url
    ServerGroup:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        episodes:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeItem"
      required:
        - name
        - type
        - episodes
    MovieDetail:
      type: object
      properties:
        title:
          type: string
        url:
          type: string
        thumbnail:
          type: string
        description:
          type: string
        quality:
          type: string
        year:
          type: string
        episode:
          type: string
        duration:
          type: string
        country:
          type: string
        director:
          type: string
        actors:
          type: string
        labels:
          type: array
          items:
            type: string
        iframeUrl:
          type: string
        embedUrl:
          type: string
        serverGroups:
          type: array
          items:
            $ref: "#/components/schemas/ServerGroup"
        relatedMovies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
      required:
        - title
        - url
